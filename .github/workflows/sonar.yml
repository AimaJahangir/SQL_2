name: SonarQube Code Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: Run Tests and Scan Code
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download your repository code onto the GitHub runner
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Run your unit tests with the updated filename
      - name: Run Unit Tests
        run: |
          python -m unittest test_grade_system.py

      # Step 4: Trigger the SonarQube / SonarCloud Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
